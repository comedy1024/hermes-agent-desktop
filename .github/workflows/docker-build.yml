name: Build and Push to ghcr.io

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）检查上游是否有更新
    - cron: '0 2 * * *'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build for amd64 only first (smoke test)
      - name: Build image (amd64, smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: ghcr.io/comedy1024/herme-agent-docker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image starts
        run: |
          docker run --rm -d --name test-hermes \
            -v /tmp/hermes-test:/opt/data \
            ghcr.io/comedy1024/herme-agent-docker:test || true
          sleep 10
          docker logs test-hermes || true
          docker stop test-hermes || true

      # Get version tag
      - name: Get version
        id: version
        run: |
          TIMESTAMP=$(date +%Y%m%d)
          echo "tag=${TIMESTAMP}" >> $GITHUB_OUTPUT

      # Push multi-arch image
      - name: Push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/comedy1024/herme-agent-docker:latest
            ghcr.io/comedy1024/herme-agent-docker:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/comedy1024/herme-agent-docker
            org.opencontainers.image.description=Hermes Agent + Pan UI (i18n) in Linux GUI Desktop
            org.opencontainers.image.licenses=Apache-2.0
