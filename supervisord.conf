[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:desktop]
command=/opt/noVNC/start.sh
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/desktop.log
stderr_logfile=/var/log/supervisor/desktop-error.log

[program:hermes-gateway]
command=hermes gateway --host 0.0.0.0 --port 8642
directory=/opt/hermes
environment=HOME="/opt/data",HERMES_HOME="/opt/data",PYTHONUNBUFFERED="1"
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/hermes-gateway.log
stderr_logfile=/var/log/supervisor/hermes-gateway-error.log

[program:pan-ui]
command=node server.js
directory=/opt/pan-ui
environment=HOSTNAME="0.0.0.0",PORT="3199",HERMES_RUNTIME_URL="http://localhost:8642"
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/pan-ui.log
stderr_logfile=/var/log/supervisor/pan-ui-error.log
