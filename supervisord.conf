[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:desktop]
command=/opt/openclaw-entrypoint.sh
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/desktop.log
stderr_logfile=/var/log/supervisor/desktop-error.log

[program:pan-ui]
command=node server.js
directory=/opt/pan-ui
environment=HOSTNAME="0.0.0.0",PORT="3199",HOME="/opt/data",HERMES_HOME="/opt/data",PYTHONUNBUFFERED="1",PATH="/usr/local/bin:/usr/bin:/bin"
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/pan-ui.log
stderr_logfile=/var/log/supervisor/pan-ui-error.log
